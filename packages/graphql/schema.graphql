type CreateUserPayload {
  username: String
}

type CurrentUser {
  groups: [String!]
  institutionCode: String
  userId: String
  username: String
}

type Image {
  contentType: String
  downloadUrl: String
  fileName: String
  imageId: String
  imagePath: String
  sizeBytes: Int
}

type MedicalStaff {
  institutionCode: String
  name: String
  profession: String
  staffCode: String
}

type Mutation {
  addRandomMedicalStaff(institutionCode: String!): UpsertMedicalStaffsPayload
  clearMedicalStaffsByInstitution(institutionCode: String!): UpsertMedicalStaffsPayload
  createImageUploadUrl(contentType: String!, fileName: String!): PresignedUploadPayload
  createUser(email: String!, password: String!, username: String!): CreateUserPayload
  registerImage(contentType: String!, fileName: String!, imagePath: String!, sizeBytes: Int!): RegisterImagePayload
  resetUserPassword(username: String!): ResetUserPasswordPayload
  seedMedicalStaffs: UpsertMedicalStaffsPayload
}

type PresignedUploadPayload {
  imagePath: String
  uploadUrl: String
}

type Query {
  currentUser: CurrentUser
  images: [Image!]
  medicalStaffsByInstitution(institutionCode: String!): [MedicalStaff!]
  seedItems: [SeedItem!]
  users: [User!]
}

type RegisterImagePayload {
  appliedCount: Int
}

type ResetUserPasswordPayload {
  temporaryPassword: String
  username: String
}

type SeedItem {
  code: String
  label: String
}

type UpsertMedicalStaffsPayload {
  appliedCount: Int
}

type User {
  createdAt: String
  email: String
  uid: String
  userType: String
  username: String
}
